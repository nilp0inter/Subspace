name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3.21.2

      - name: Enable FlakeHub Cache
        uses: DeterminateSystems/flakehub-cache-action@9926dde74484ccb2224835b80531de64ed4336ef # v3.21.2

      - name: Verify release tag signature
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gpg --import .github/release-signing-pubkey.asc
          git tag -v "${GITHUB_REF_NAME}" 2>&1 | tee /tmp/verify.out
          grep -E "Good signature from" /tmp/verify.out

      - name: Validate flake
        run: nix flake check --no-write-lock-file

      - name: Verify devshell toolchain
        run: nix develop --no-write-lock-file -c gradle --version

      - name: Provision keystores
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p .android
          printf '%s' "$DEBUG_KEYSTORE_BASE64" | base64 -d > .android/debug.keystore
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > release.keystore
          test -s .android/debug.keystore
          test -s release.keystore

      - name: Build release APK
        env:
          ANDROID_RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: nix develop --no-write-lock-file -c gradle assembleRelease

      - name: Verify APK signature
        run: |
          nix develop --no-write-lock-file -c bash -c '
            apksigner verify --verbose --print-certs \
              app/build/outputs/apk/release/*.apk | tee /tmp/sig.out
            grep -E "Verified" /tmp/sig.out
          '

      - name: Upload release APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: subspace-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            app/build/outputs/apk/release/*.apk
